# Inference routing configuration
# --------------------------------
# checkpoint:  path to the best_model.pt to deploy
# threshold:   confidence cutoff (0-1)
#              - predictions >= threshold → accepted (returned to caller)
#              - predictions <  threshold → uncertain (sent to fallback)
#
# Tuning guidance (from threshold sweep on recaptcha_tiles_run1, 14 classes, TTA on):
#   0.50 → 98.2% coverage  / 93.5% accepted accuracy
#   0.55 → 97.1% coverage  / 94.0% accepted accuracy
#   0.60 → 96.0% coverage  / 94.7% accepted accuracy
#   0.65 → 94.7% coverage  / 95.3% accepted accuracy
#   0.70 → 93.4% coverage  / 95.7% accepted accuracy
#   0.75 → 91.0% coverage  / 96.6% accepted accuracy
#   0.80 → 85.7% coverage  / 97.4% accepted accuracy  ← recommended default
#   0.85 → 64.5% coverage  / 97.7% accepted accuracy  (over-rejects)
#   0.90 →  2.9% coverage  / 92.9% accepted accuracy  (over-rejects)
#
# Notable weaknesses (see confusion_matrix.png):
#   - Other:  recall 5% — Other images are spread across many classes, mostly Car (39%).
#             Raise threshold or treat "Other" predictions with caution.
#   - Car:    precision 60% — driven by Other images mislabelled as Car.

checkpoint: models/recaptcha_tiles_run1/best_model.pt
threshold: 0.80
tta: true
uncertain_label: uncertain
